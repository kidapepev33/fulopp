<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/fulopp/assets/css/_extend.css">
    <title>Iniciar Sesion</title>
</head>

<body class="roboto">
    <header id="header-container"></header>

    <main class="top-margin container login-page max-width_container">
        <section class="login-card">
            <h2>Iniciar sesion</h2>
            <p>Ingresa con correo y contrasena para acceder a Rutas e Informe.</p>

            <form id="login-form" class="login-form" novalidate>
                <label for="email">Correo</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit" class="login-btn">Entrar</button>
            </form>
        </section>
    </main>

    <footer id="footer-container"></footer>

    <script src="/fulopp/assets/js/components/toast.js"></script>
    <script src="/fulopp/assets/js/auth/login.js"></script>
    <script src="/fulopp/assets/js/components/header.js"></script>
</body>

</html>
